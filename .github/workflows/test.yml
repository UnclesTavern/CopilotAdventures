name: Test

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'Solutions/**'
      - '.github/workflows/test.yml'
  push:
    branches: [ main ]
    paths:
      - 'Solutions/**'
      - '.github/workflows/test.yml'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-javascript:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: Solutions/JavaScript/The-Gridlock-Arena-of-Mythos
        run: npm install
      
      - name: Run JavaScript tests
        working-directory: Solutions/JavaScript/The-Gridlock-Arena-of-Mythos
        run: npm test

  test-csharp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Solutions/CSharp
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
          cache: true
          cache-dependency-path: Solutions/CSharp/CopilotAdventures.csproj
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Run tests
        run: dotnet test --verbosity minimal

  test-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Run Python tests
        working-directory: Solutions/Python
        run: python test_gridlock_arena.py
