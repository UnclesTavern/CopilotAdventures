name: Test

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'Solutions/**'
      - '.github/workflows/test.yml'
  push:
    branches: [ main ]
    paths:
      - 'Solutions/**'
      - '.github/workflows/test.yml'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-javascript:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Solutions/JavaScript/The-Gridlock-Arena-of-Mythos
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Solutions/JavaScript/The-Gridlock-Arena-of-Mythos/package-lock.json
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      
      - name: Run tests
        run: npm test

  test-csharp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Solutions/CSharp
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
          cache: true
          cache-dependency-path: Solutions/CSharp/CopilotAdventures.csproj
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Run tests
        run: dotnet test --verbosity minimal

  test-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Solutions/Python
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run tests
        run: python test_gridlock_arena.py

  test-ruby:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Solutions/Ruby
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      
      - name: Run Ruby solutions
        run: |
          ruby The-Clockwork-Town-of-Tempora.rb
          ruby The-Magical-Forest-of-Algora.rb
          ruby The-Scrolls-Of-Eldoria.rb
          ruby The-Legendary-Duel-of-Stonevale.rb
          ruby The-Celestial-Alignment-of-Lumoria.rb
          ruby The-Chamber-Of-Echoes.rb
          ruby The-Gridlock-Arena-of-Mythos.rb
