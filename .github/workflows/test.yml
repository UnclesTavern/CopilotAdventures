name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-javascript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Solutions/JavaScript/The-Gridlock-Arena-of-Mythos
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Solutions/JavaScript/The-Gridlock-Arena-of-Mythos/package.json
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      
      - name: Run tests
        run: npm test
